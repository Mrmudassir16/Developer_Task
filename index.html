<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating... | Portal</title>
    <script>
        // Check if token exists in localStorage
        const token = localStorage.getItem('session_token');
        if (token) {
            window.location.replace('profile.html');
        } else {
            window.location.replace('login.html');
        }
    </script>
</head>
<body style="background-color: #0f172a; display: flex; align-items: center; justify-content: center; height: 100vh; color: #94a3b8; font-family: sans-serif;">
    <div style="text-align: center;">
        <h3>Redirecting...</h3>
        <p>Checking your session status.</p>
    </div>
</body>
</html>
