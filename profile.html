<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Dashboard | Premium Portal</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Top-right Logout Button (Floating style on desktop, header style on mobile) -->
    <div class="position-absolute top-0 end-0 p-4" style="z-index: 5;">
        <button id="logout-btn-top" class="btn btn-sm btn-outline-danger px-3" style="border-radius: 8px;">
            <i class="fa-solid fa-power-off me-2"></i>Logout
        </button>
    </div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">
                <div class="glass-card profile-card position-relative">
                    <!-- Loading Spinner Overlay -->
                    <div id="loader-overlay" class="spinner-overlay">
                        <div class="loader"></div>
                    </div>

                    <!-- Header -->
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <div class="bg-primary rounded-circle d-flex align-items-center justify-content-center" style="width: 64px; height: 64px; background: var(--accent-gradient) !important;">
                            <i class="fa-solid fa-user-astronaut text-white fs-3"></i>
                        </div>
                        <div>
                            <h1 class="card-header-title mb-0 fs-2" id="profile-name-title">Loading...</h1>
                            <p class="text-secondary mb-0" id="profile-email-title">...</p>
                        </div>
                    </div>

                    <!-- Custom Alert Box -->
                    <div id="alert-box" class="custom-alert">
                        <i class="fa-solid fa-circle-exclamation me-2"></i>
                        <span id="alert-message">Status message goes here</span>
                    </div>

                    <form id="profile-form" novalidate>
                        <!-- Basic Account Details (Read-only) -->
                        <h5 class="border-bottom border-secondary pb-2 mb-3 text-secondary" style="--bs-border-opacity: .2;">Account Info</h5>
                        <div class="row mb-4">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="account-name" readonly disabled>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="account-email" readonly disabled>
                            </div>
                        </div>

                        <!-- Additional Profile Details (Editable - Stored in MongoDB) -->
                        <h5 class="border-bottom border-secondary pb-2 mb-3 text-secondary" style="--bs-border-opacity: .2;">Additional Details</h5>
                        <div class="row">
                            <!-- Age -->
                            <div class="col-md-4 mb-3">
                                <label for="profile-age" class="form-label">Age</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-hashtag"></i></span>
                                    <input type="number" class="form-control" id="profile-age" placeholder="Age" min="1" max="150" required>
                                </div>
                            </div>
                            <!-- Date of Birth -->
                            <div class="col-md-8 mb-3">
                                <label for="profile-dob" class="form-label">Date of Birth (DOB)</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-regular fa-calendar-days"></i></span>
                                    <input type="date" class="form-control" id="profile-dob" required>
                                </div>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <!-- Contact Number -->
                            <div class="col-12">
                                <label for="profile-contact" class="form-label">Contact Number</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-phone"></i></span>
                                    <input type="tel" class="form-control" id="profile-contact" placeholder="e.g. +1234567890" required>
                                </div>
                            </div>
                        </div>

                        <!-- Bio -->
                        <div class="mb-4">
                            <label for="profile-bio" class="form-label">Biography / Description</label>
                            <textarea class="form-control" id="profile-bio" rows="3" placeholder="Tell us about yourself..."></textarea>
                        </div>

                        <!-- Update Details Button -->
                        <div class="row g-3">
                            <div class="col-sm-6 order-sm-2">
                                <button type="submit" class="btn btn-premium">
                                    Update Profile <i class="fa-regular fa-floppy-disk ms-2"></i>
                                </button>
                            </div>
                            <div class="col-sm-6 order-sm-1">
                                <button type="button" id="logout-btn-bottom" class="btn btn-premium-secondary">
                                    Logout <i class="fa-solid fa-arrow-right-from-bracket ms-2"></i>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/profile.js"></script>
</body>
</html>
