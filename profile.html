<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Dashboard | Premium Portal</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Top-right Logout Button (Floating style on desktop, header style on mobile) -->
    <div class="position-absolute top-0 end-0 p-4" style="z-index: 5;">
        <button id="logout-btn-top" class="btn btn-sm btn-outline-danger px-3 d-flex align-items-center gap-2" style="border-radius: 8px;">
            <svg class="icon-svg text-danger" style="color: #dc3545;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg>
            <span>Logout</span>
        </button>
    </div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">
                <div class="glass-card profile-card position-relative">
                    <!-- Loading Spinner Overlay -->
                    <div id="loader-overlay" class="spinner-overlay">
                        <div class="loader"></div>
                    </div>

                    <!-- Header -->
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <div class="bg-primary rounded-circle d-flex align-items-center justify-content-center" style="width: 64px; height: 64px; background: var(--accent-gradient) !important;">
                            <!-- Earth / Astronaut Globe SVG -->
                            <svg class="icon-svg text-white" style="color: #fff;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="32" height="32"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path><path d="M2 12h20"></path></svg>
                        </div>
                        <div>
                            <h1 class="card-header-title mb-0 fs-2" id="profile-name-title">Loading...</h1>
                            <p class="text-secondary mb-0" id="profile-email-title">...</p>
                        </div>
                    </div>

                    <!-- Custom Alert Box -->
                    <div id="alert-box" class="custom-alert">
                        <span id="alert-icon-container" class="me-2">
                            <svg class="icon-svg" style="color: #fca5a5;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                        </span>
                        <span id="alert-message">Status message goes here</span>
                    </div>

                    <form id="profile-form" novalidate>
                        <!-- Basic Account Details (Read-only) -->
                        <h5 class="border-bottom border-secondary pb-2 mb-3 text-secondary" style="--bs-border-opacity: .2;">Account Info</h5>
                        <div class="row mb-4">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="account-name" readonly disabled>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="account-email" readonly disabled>
                            </div>
                        </div>

                        <!-- Additional Profile Details (Editable - Stored in MongoDB) -->
                        <h5 class="border-bottom border-secondary pb-2 mb-3 text-secondary" style="--bs-border-opacity: .2;">Additional Details</h5>
                        <div class="row">
                            <!-- Age -->
                            <div class="col-md-4 mb-3">
                                <label for="profile-age" class="form-label">Age</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <svg class="icon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><line x1="4" y1="9" x2="20" y2="9"></line><line x1="4" y1="15" x2="20" y2="15"></line><line x1="10" y1="3" x2="8" y2="21"></line><line x1="16" y1="3" x2="14" y2="21"></line></svg>
                                    </span>
                                    <input type="number" class="form-control" id="profile-age" placeholder="Age" min="1" max="150" required>
                                </div>
                            </div>
                            <!-- Date of Birth -->
                            <div class="col-md-8 mb-3">
                                <label for="profile-dob" class="form-label">Date of Birth (DOB)</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <svg class="icon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                    </span>
                                    <input type="date" class="form-control" id="profile-dob" required>
                                </div>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <!-- Contact Number -->
                            <div class="col-12">
                                <label for="profile-contact" class="form-label">Contact Number</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <svg class="icon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                                    </span>
                                    <input type="tel" class="form-control" id="profile-contact" placeholder="e.g. +1234567890" required>
                                </div>
                            </div>
                        </div>

                        <!-- Bio -->
                        <div class="mb-4">
                            <label for="profile-bio" class="form-label">Biography / Description</label>
                            <textarea class="form-control" id="profile-bio" rows="3" placeholder="Tell us about yourself..."></textarea>
                        </div>

                        <!-- Update Details Button -->
                        <div class="row g-3">
                            <div class="col-sm-6 order-sm-2">
                                <button type="submit" class="btn btn-premium d-flex align-items-center justify-content-center">
                                    <span>Update Profile</span>
                                    <svg class="icon-svg ms-2 text-white" style="stroke: #fff;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                                </button>
                            </div>
                            <div class="col-sm-6 order-sm-1">
                                <button type="button" id="logout-btn-bottom" class="btn btn-premium-secondary d-flex align-items-center justify-content-center">
                                    <span>Logout</span>
                                    <svg class="icon-svg ms-2" style="stroke: var(--primary-color);" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/profile.js"></script>
</body>
</html>
